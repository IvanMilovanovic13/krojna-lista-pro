server {
    listen 80;
    server_name tvoj-domen.rs www.tvoj-domen.rs;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tvoj-domen.rs www.tvoj-domen.rs;

    ssl_certificate /etc/letsencrypt/live/tvoj-domen.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tvoj-domen.rs/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    location / {
        proxy_pass http://krojna-lista-pro-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://krojna-lista-pro-app:8080/healthz;
    }

    location /readyz {
        proxy_pass http://krojna-lista-pro-app:8080/readyz;
    }

    location /ops/runtime {
        proxy_pass http://krojna-lista-pro-app:8080/ops/runtime;
    }
}
